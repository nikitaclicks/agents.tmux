# agents.tmux configuration

# Which tmux session to watch.
# "auto" = deduplicate mirrored session groups by pane ID (recommended).
# Or set a specific session name, e.g. session = "main"
session = "auto"

# How often to poll tmux panes (seconds)
poll_interval = 2

# в”Ђв”Ђ Detection rules в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Controls how pane output is classified as busy / waiting / idle.
# You can tune these without touching any Python.
[detection]

# CPU % above which a process is considered busy, regardless of output text.
# Set lower (e.g. 5.0) to catch light activity; higher (e.g. 20.0) to ignore
# brief wake-ups from terminal focus events.
cpu_busy_threshold = 10.0

# Only the last N lines of pane output are checked for waiting/idle patterns.
# Prevents old scrollback text (e.g. a diff containing "Asked user") from
# triggering false waiting states.
tail_lines = 5

# Regex patterns searched in the full pane text; any match в†’ busy.
# These supplement CPU detection for activity that shows in output before
# the process ramps up measurable CPU (e.g. a tool call just starting).
busy_patterns = [
    'вњ» \w+вЂ¦',          # Claude Code: active thinking (trailing вЂ¦ = still running)
    'вЏє .+вЂ¦',           # Claude Code: in-progress tool call
    'в†“\s*\d+.*token',  # active token stream
]

# Regex patterns searched in the last tail_lines only; any match в†’ waiting.
waiting_tail_patterns = [
    'Asked user',
    'AskUser',
    'в†‘в†“ to select',     # interactive question dialog footer (copilot, claude)
    'Enter to confirm', # same dialog, alternate marker
]

# в”Ђв”Ђ Agents в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
# Each agent entry must have: name, process_pattern
# Optional per-agent fields:
#   icon                вЂ” displayed in the menu bar (1вЂ“2 chars)
#   window_pattern      вЂ” additional filter on tmux window name
#   content_pattern     вЂ” additional filter on pane text (for generic processes like node)
#   busy_patterns       вЂ” extra regexes (full text) that mean this agent is busy
#   idle_tail_patterns  вЂ” tail regexes that mean this agent is idle (e.g. input prompt)

[[agents]]
name    = "claude"
icon    = "в—†"
# Claude Code runs as its own version-number binary (e.g. 2.1.142)
process_pattern = '^\d+\.\d+\.\d+$'

[[agents]]
name    = "copilot"
icon    = "в—‡"
process_pattern = '^copilot$'
# "Esc to cancel" only appears in copilot output during an active run
busy_patterns = ['Esc to cancel']

[[agents]]
name    = "pi"
icon    = "ПЂ"
# pi runs as node вЂ” narrow by its token-budget status bar (always in last 2 lines)
process_pattern = '^node$'
content_pattern = '\d+\.\d+%/\d+k'
# pi's "в”Ђв”Ђв”Ђв”Ђ INSERT" prompt in the tail means it's at the input prompt = idle
idle_tail_patterns = ['в”Ђ{4,}\s*INSERT']

[[agents]]
name    = "cursor"
icon    = "вЊ¶"
# cursor-agent runs as /Users/$USER/.local/bin/agent (exec -a preserves the name)
process_pattern = '^agent$'
# window_pattern: used when cursor runs inside a tmux pane (name the window "cursor")
window_pattern  = '^cursor'
# args_pattern: used when cursor runs outside tmux вЂ” matches the full command line
args_pattern    = 'cursor.agent'

[[agents]]
name    = "opencode"
icon    = "в–Ј"
process_pattern = '^opencode$'
# "esc interrupt" appears in the footer progress bar during generation
busy_patterns = ['esc interrupt']
