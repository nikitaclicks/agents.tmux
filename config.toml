# agents.tmux configuration
# Shared detection settings used by every presentation frontend.

# Which tmux session to watch.
# "auto" = deduplicate mirrored session groups by pane ID (recommended).
# Or set a specific session name, e.g. session = "main"
session = "auto"

# How often to poll tmux panes (seconds)
poll_interval = 2

# ── Local sockets ────────────────────────────────────────────────────────
# Agents are summed across EVERY live tmux server (socket) on this machine,
# not just the default one. Use globs to exclude or restrict sockets.
# Empty ignore list = count every live socket.
ignore_sockets = []            # e.g. ["mytest*"] to skip throwaway test fixtures
# allow_sockets = ["default"]  # opt-in allowlist instead (omit = allow all)

# ── Remote hosts (SSH) ─────────────────────────────────────────────────────
# Agents on remote machines are pulled over SSH and added to the same counts.
# Zero-install: this script is piped to the remote's python3 each poll, so the
# remote needs only python3 + tmux, nothing installed.
auto_discover_remote = true    # find hosts from live `ssh <host>` sessions in `ps`
remote_hosts = []              # pin hosts to always pull, e.g. ["myserver"]
ignore_hosts = []              # skip these (e.g. ["github.com"] — non-shell ssh)
# allow_hosts = []             # opt-in allowlist (omit = allow all discovered)
remote_poll_interval = 6       # seconds; remotes polled less often than local
remote_timeout = 8             # seconds; per-host hard deadline
remote_error_cooldown = 60     # seconds to skip a host after a failed pull
# SSH options applied to every remote call. BatchMode = fail fast (never hang)
# if a host needs a password; ControlMaster/Persist keep the connection warm.
ssh_options = [
    "-o", "ConnectTimeout=4",
    "-o", "BatchMode=yes",
    "-o", "ControlMaster=auto",
    "-o", "ControlPersist=60s",
]

# ── Detection rules ────────────────────────────────────────────────────────
# Controls how pane output is classified as busy / waiting / idle.
# You can tune these without touching any Python.
[detection]

# CPU % above which a process is considered busy, regardless of output text.
# Set lower (e.g. 5.0) to catch light activity; higher (e.g. 20.0) to ignore
# brief wake-ups from terminal focus events.
cpu_busy_threshold = 10.0

# Only the last N lines of pane output are checked for waiting/idle patterns.
# Prevents old scrollback text (e.g. a diff containing "Asked user") from
# triggering false waiting states.
tail_lines = 5

# How many lines of pane scrollback to capture for the menu snippet. Larger =
# more context above the input box to fall back to. Independent of tail_lines
# (which always slices the LAST N captured lines for waiting/idle detection).
snippet_capture_lines = 30

# Regex patterns that are PREFERRED as the menu snippet — a matching line wins
# over the bottom-up fallback (scanned bottom-up, first match wins). Merged with
# any per-agent prefer_snippet_patterns. Leave empty globally; set per agent.
prefer_snippet_patterns = []

# Regex patterns searched in the full pane text; any match → busy.
# These supplement CPU detection for activity that shows in output before
# the process ramps up measurable CPU (e.g. a tool call just starting).
busy_patterns = [
    '✻ \w+…',          # Claude Code: active thinking (trailing … = still running)
    '⏺ .+…',           # Claude Code: in-progress tool call
    '↓\s*\d+.*token',  # active token stream
]

# Regex patterns searched in the last tail_lines only; any match → waiting.
waiting_tail_patterns = [
    'Asked user',
    'AskUser',
    '↑↓ to select',          # interactive question dialog footer (copilot, claude)
    'Enter to confirm',      # same dialog, alternate marker
    'Do you want to proceed', # claude permission / plan-approval prompt
    'Tab to amend',          # claude confirmation dialog footer (backup marker)
]

# ── Agents ─────────────────────────────────────────────────────────────────
# Each agent entry must have: name, process_pattern
# Optional per-agent fields:
#   icon                — displayed in the menu bar (1–2 chars)
#   window_pattern      — additional filter on tmux window name
#   content_pattern     — additional filter on pane text (for generic processes like node)
#   busy_patterns       — extra regexes (full text) that mean this agent is busy
#   idle_tail_patterns  — tail regexes that mean this agent is idle (e.g. input prompt)
#   prefer_snippet_patterns — regexes preferred as the menu snippet (merged w/ global)
#   skip_snippet_patterns   — regexes skipped when picking the snippet (merged w/ global)

[[agents]]
name    = "claude"
icon    = "◆"
# Claude Code runs as its own version-number binary (e.g. 2.1.142)
process_pattern = '^\d+\.\d+\.\d+$'
# Show the last assistant/tool line (⏺ U+23FA) instead of the bare ❯ input box.
# ⏺ is often followed by a non-breaking space, so anchor on the glyph itself.
prefer_snippet_patterns = ['^⏺']
# Skip Claude's thinking/spinner status line ("✻ Brewed for 53s", "✶ Spelunking…
# (…)") — it's status chrome, not output, and lingers above the box when idle.
# The leading glyph cycles through the spinner frames listed in the class.
skip_snippet_patterns = ['^[✻✽✶✢✳✷✸✹✺✲✱] \w']

[[agents]]
name    = "copilot"
icon    = "◇"
process_pattern = '^copilot$'
# "Esc to cancel" only appears in copilot output during an active run
busy_patterns = ['Esc to cancel']

[[agents]]
name    = "pi"
icon    = "π"
# pi runs as a bare `node` on some hosts and as a native `pi` binary on others;
# the token-budget status bar (content_pattern) is the real discriminator.
process_pattern = '^(node|pi)$'
content_pattern = '\d+\.\d+%/\d+k'
# pi's "──── INSERT" prompt in the tail means it's at the input prompt = idle
idle_tail_patterns = ['─{4,}\s*INSERT']

[[agents]]
name    = "cursor"
icon    = "⌶"
# cursor-agent's pane command is `agent` on some launches and `node` on others,
# so match either and use the cursor-agent path in the process args as the real
# discriminator — works regardless of the tmux window name.
process_pattern   = '^(agent|node)$'
tmux_args_pattern = 'cursor.agent'   # in tmux: a descendant process matches this
args_pattern      = 'cursor.agent'   # external: matches the full command line

[[agents]]
name    = "opencode"
icon    = "▣"
process_pattern = '^opencode$'
# "esc interrupt" appears in the footer progress bar during generation
busy_patterns = ['esc interrupt']

[[agents]]
name    = "codex"
icon    = "◈"
# Codex CLI runs as node in tmux; narrow it by the descendant process args so it
# doesn't collide with other node-based agents like pi.
process_pattern = '^node$'
tmux_args_pattern = '@openai/codex|(?:^|[ /])codex(?:\s|$)|/codex/codex'
# Outside tmux, also match the full command line because the process name is
# usually node or a vendored binary path.
args_pattern    = '@openai/codex|(?:^|[ /])codex(?:\s|$)|/codex/codex'
